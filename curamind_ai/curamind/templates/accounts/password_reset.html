{% extends 'base.html' %}
{% block title %}Password Reset{% endblock %}
{% block content %}
<div style="max-width:440px;margin:80px auto">
  <div class="card" style="text-align:center">
    <div style="font-size:3rem;margin-bottom:16px">🔑</div>
    <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:8px">Reset Password</h2>
    <p style="color:#64748b;font-size:.9rem;margin-bottom:28px">Enter your email and we'll send reset instructions.</p>
    <form method="post">
      {% csrf_token %}
      <div class="form-group" style="text-align:left">
        <label>Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;justify-content:center">
        📧 Send Reset Instructions
      </button>
    </form>
    <div style="margin-top:20px;font-size:.85rem;color:#64748b">
      <a href="{% url 'login' %}">← Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
