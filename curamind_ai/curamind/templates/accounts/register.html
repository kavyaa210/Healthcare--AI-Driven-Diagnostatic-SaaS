{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block extra_css %}
<style>
.reg-wrap{max-width:560px;margin:0 auto;padding:40px 0;}
.reg-card{background:#fff;border-radius:20px;padding:40px;box-shadow:0 10px 40px rgba(108,71,255,.1);border:1px solid #e8e0ff;}
.role-selector{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;}
.role-option{display:none;}
.role-label{padding:14px;border:2px solid #e2e8f0;border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;}
.role-label:hover{border-color:#6c47ff;}
.role-option:checked + .role-label{border-color:#6c47ff;background:#ede9ff;color:#6c47ff;font-weight:700;}
.role-icon{font-size:1.5rem;display:block;margin-bottom:4px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
</style>
{% endblock %}
{% block content %}
<div class="reg-wrap">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:2.5rem">🏥</div>
    <h2 style="font-family:'Plus Jakarta Sans',sans-serif;font-size:1.6rem;font-weight:800;margin-top:10px">Create Your Account</h2>
    <p style="color:#64748b;font-size:.9rem">Join CuraMind AI — HIPAA-Compliant Telehealth Platform</p>
  </div>
  <div class="reg-card">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Account Type</label>
        <div class="role-selector">
          <div>
            <input type="radio" name="role" value="PATIENT" id="r-patient" class="role-option" checked/>
            <label for="r-patient" class="role-label"><span class="role-icon">🧑‍⚕️</span>Patient</label>
          </div>
          <div>
            <input type="radio" name="role" value="DOCTOR" id="r-doctor" class="role-option"/>
            <label for="r-doctor" class="role-label"><span class="role-icon">👨‍⚕️</span>Doctor</label>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" name="first_name" class="form-control" placeholder="First name" required/></div>
        <div class="form-group"><label>Last Name</label><input type="text" name="last_name" class="form-control" placeholder="Last name" required/></div>
      </div>
      <div class="form-group"><label>Email Address</label><input type="email" name="email" class="form-control" placeholder="you@example.com" required/></div>
      <div class="form-group"><label>Phone Number</label><input type="text" name="phone" class="form-control" placeholder="+91 9999999999"/></div>
      <div id="doctor-fields" style="display:none">
        <div class="form-group"><label>Specialization</label><input type="text" name="specialization" class="form-control" placeholder="e.g. Cardiology, Radiology"/></div>
        <div class="form-group"><label>Medical License Number</label><input type="text" name="license_number" class="form-control" placeholder="e.g. MCI/123456"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Password</label><input type="password" name="password" class="form-control" placeholder="Min 8 characters" required/></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required/></div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:13px;font-size:.95rem;justify-content:center">
        ✅ Create Account
      </button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.85rem;color:#64748b">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </p>
  </div>
</div>
<script>
document.querySelectorAll('input[name="role"]').forEach(r => {
  r.addEventListener('change', () => {
    document.getElementById('doctor-fields').style.display = r.value === 'DOCTOR' && r.checked ? 'block' : 'none';
  });
});
</script>
{% endblock %}
